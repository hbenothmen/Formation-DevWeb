
<p>Mise a jour des utilisateurs</p>
<div style="width: 700px; border-radius: 10px; border: solid 1px rgba(179, 179, 182, 0.674); padding:20px; margin-left: 30px;" >
 
    <form #updateuserForm="ngForm" (ngSubmit)=" modifierUser(updateuserForm)">
  <div class="form-group row ">
    <label for="inputID" class="col-sm-2 col-form-label">ID</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" name="id"  [(ngModel)]="user.id">
    </div>
  </div>
  <div class="form-group row mt-2">
    <label for="nom" class="col-sm-2 col-form-label">Nom</label>
    <div class="col-sm-10">
      <input type="texte" class="form-control" name="nom"  [(ngModel)]="user.nom" placeholder="Nom">
    </div>
  </div>
<div class="form-group row mt-2">
    <label for="inputEmail" class="col-sm-2 col-form-label">Pays</label>
    <div class="col-sm-10">
      <input type="email" class="form-control" name="email"  [(ngModel)]="user.email" placeholder="Email">
    </div>
  </div>
  <div class="form-group row mt-2">
    <label for="inputPass" class="col-sm-2 col-form-label">Prix</label>
    <div class="col-sm-10">
      <input type="password" class="form-control" name="password"  [(ngModel)]="user.password" placeholder="Password">
    </div>
  </div>
 <div class="d-grid gap-4  justify-content-md-end mt-4 ">
      <button type="submit" class="btn btn-primary" [disabled]="updateuserForm.invalid" >Mettre à jour </button>
    </div>
</form>
 
  </div>
