<p>modifier-dest works!</p>
<p>Update destination</p>
<div style="width: 700px; border-radius: 10px; border: solid 1px rgba(179, 179, 182, 0.674); padding:20px; margin-left: 30px;" >
 
    <form #updatedestForm="ngForm" (ngSubmit)=" modifierDest(updatedestForm)">
  <div class="form-group row ">
    <label for="inputID" class="col-sm-2 col-form-label">ID</label>
    <div class="col-sm-10">
      <input type="number" class="form-control" name="id"  [(ngModel)]="destination.id">
    </div>
  </div>
  <div class="form-group row mt-2">
    <label for="inputDestination" class="col-sm-2 col-form-label">Destination</label>
    <div class="col-sm-10">
      <input type="texte" class="form-control" name="destination"  [(ngModel)]="destination.destination" placeholder="Ville">
    </div>
  </div>
<div class="form-group row mt-2">
    <label for="inputPays" class="col-sm-2 col-form-label">Pays</label>
    <div class="col-sm-10">
      <input type="texte" class="form-control" name="pays"  [(ngModel)]="destination.pays" placeholder="Pays">
    </div>
  </div>
  <div class="form-group row mt-2">
    <label for="inputPrix" class="col-sm-2 col-form-label">Prix</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" name="prix"  [(ngModel)]="destination.prix" placeholder="Prix">
    </div>
  </div>
  <div class="form-group row mt-2">
    <label for="inputImage" class="col-sm-2 col-form-label">Nom d'image </label>
    <div class="col-sm-10">
      <input type="text" class="form-control" name="image"  [(ngModel)]="destination.image" placeholder="assets/images/image.png">
    </div>
  </div>
  
   <div class="form-group row mt-2">
      <label for="inputState" class="col-sm-2 col-form-label">State</label>
      <div class="col-sm-10">
      <select name="disponible" class="form-control" [(ngModel)]="destination.disponible">
        <option selected>Choisir disponibilite</option> 
        <option [ngValue]="true">Disponible</option>
        <option [ngValue]="false">Non disponible</option>

      </select></div>
    </div>
    <div class="d-grid gap-4  justify-content-md-end mt-4 ">
      <button type="submit" class="btn btn-primary" [disabled]="updatedestForm.invalid" >Mettre à jour </button>
    </div>
</form>
 
  </div>
