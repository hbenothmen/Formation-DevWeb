<h5 style="padding-left: 40px;">Supprimer-destination </h5>
<div style="width: 700px; border-radius: 10px; border: solid 1px rgba(179, 179, 182, 0.674); padding:20px; margin-left: 30px;" >
<form #destForm="ngForm" (ngSubmit)="supDest(destForm)">
  <div class="form-group row mb-2">
    <label for="id" class="col-sm-2 col-form-label">Entrer un identifiant</label>
    <div class="col-sm-10">
    <input type="number" id="id" name="id" class="form-control" required [(ngModel)]="destinationid">
  </div>
  </div>
  <div class="div-Button">
    <button type="submit" class="btn btn-primary">Supprimer</button>
    <button type="submit" class="btn btn-outline-primary" routerLink="/administration">Retour</button>
    </div>
   
  </form>
</div>
