
<div style="width: 700px; border-radius: 10px; border: solid 1px rgba(179, 179, 182, 0.674); padding:20px; margin-left: 30px;" >
<form #destForm="ngForm" (ngSubmit)="addDest(destForm)">
  <div class="form-group row mb-2">
    <label for="id" class="col-sm-2 col-form-label">ID</label>
    <div class="col-sm-10">
    <input type="number" id="id" name="id" class="form-control" required ngModel>
  </div>
  </div>

    <div class="form-group row mb-3">
        <label for="name" class="col-sm-2 col-form-label">Destination</label>
        <div class="col-sm-10">
        <input type="text" id="destination" name="destination" class="form-control" required ngModel>
    </div>
      </div>
 <div class="form-group row mb-3">
        <label for="name" class="col-sm-2 col-form-label">Pays</label>
        <div class="col-sm-10">
        <input type="text" id="pays" name="pays" class="form-control" required ngModel>
    </div>
      </div>
      <div class="form-group row mb-3">
        <label for="name" class="col-sm-2 col-form-label">Prix</label>
        <div class="col-sm-10">
        <input type="text" id="prix" name="prix" class="form-control" required ngModel>
    </div>
      </div>
     <div class="form-group row mb-3">
        <label for="name" class="col-sm-2 col-form-label">Image</label>
        <div class="col-sm-10">
        <input type="text" id="image" name="image" class="form-control" required ngModel>
    </div>
      </div>
      <div class="form-group row mb-3">
        <label for="name" class="col-sm-2 col-form-label">Disponibilité</label>
        <div class="col-sm-10">
        <!-- <input type="text" id="image" name="image" class="form-control" required ngModel> -->
    <select name="disponible" class="form-control" required ngModel>
        <option selected>Choisir disponibilite</option>
        <option [ngValue]="true">Disponible</option>
        <option [ngValue]="false">Non disponible</option>

      </select>
      </div>
      </div>
    <button type="submit" class="btn btn-primary">Ajouter Produit</button>
</form>
