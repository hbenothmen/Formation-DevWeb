<div style="width: 700px; border-radius: 10px; border: solid 1px rgba(179, 179, 182, 0.674); padding:20px; margin-left: 30px;" >
<form #signinFrom="ngForm" (ngSubmit)="signIn()">

    <div class="form-group row mb-3">
        <label for="name" class="col-sm-2 col-form-label">E-mail</label>
        <div class="col-sm-10">
        <input type="email" id="email" name="email" class="form-control" required [(ngModel)]="credentials.email">
    </div>
      </div>
      <div class="form-group row mb-3">
        <label for="password" class="col-sm-2 col-form-label">Mot de passe</label>
        <div class="col-sm-10">
        <input type="password" id="password" name="password" class="form-control" required [(ngModel)]="credentials.password">
    </div>
      </div>
       <button type="submit" class="btn btn-primary"  [disabled]="signinFrom.invalid">Signin</button>
    </form>
</div>
