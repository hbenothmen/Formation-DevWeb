<div style="width: 700px; border-radius: 10px; border: solid 1px rgba(179, 179, 182, 0.674); padding:20px; margin-left: 30px;" >
<form #userForm="ngForm" (ngSubmit)="addUser(userForm)">
  
    <div class="form-group row mb-3">
        <label for="nom" class="col-sm-2 col-form-label">Nom</label>
        <div class="col-sm-10">
        <input type="text" id="nom" name="nom" class="form-control" required [(ngModel)]="user.nom">
    </div>
      </div>
 <div class="form-group row mb-3">
        <label for="email" class="col-sm-2 col-form-label">Email</label>
        <div class="col-sm-10">
        <input type="email" id="email" name="email" class="form-control" required [(ngModel)]="user.email">
    </div>
      </div>
      <div class="form-group row mb-3">
        <label for="password" class="col-sm-2 col-form-label">Password</label>
        <div class="col-sm-10">
        <input type="password" id="password" name="password" class="form-control" required [(ngModel)]="user.password">
    </div>
      </div>
    
     <div class="div-Button">
     <button type="submit" class="btn btn-primary">Ajouter User</button>
    <button type="submit" class="btn btn-outline-primary" routerLink="/administration">Retour</button>
    </div>
   
</form>
