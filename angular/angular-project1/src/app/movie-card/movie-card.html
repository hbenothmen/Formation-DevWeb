    @for(film of films; track film.id){
        @if(film.year==2026){
            <section >
            <a [routerLink]="['/moviedetails',film.id]">
<div class="card">

</div>
<div class="card-body" style="text-align:center;">
    <h2>{{film.title}}</h2>
</div>

            </a>
            </section>

        }}

        </div>
        <h2 class="section-title">Old-movies </h2>

            <section  class="s">
             <a [routerLink]="['/movie-card',film.id]">
